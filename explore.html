<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blendr | Explore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. BASE & THEME VARIABLES --- */
        :root {
            --bg-deep: #050508;
            --card-bg: #121218;
            --accent-pink: #ff2a7a;
            --accent-cyan: #00e5ff;
            --accent-yellow: #ffc107;
            --text-main: #ffffff;
            --text-muted: #8b8b99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #000; 
            display: flex; justify-content: center; 
            height: 100vh; height: 100dvh; 
            overflow: hidden; 
        }

        .app-container {
            width: 100%; max-width: 550px; height: 100%;
            background-color: var(--bg-deep); position: relative;
            display: flex; flex-direction: column; 
        }

        /* --- 2. SIDEBAR --- */
        .sidebar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; opacity: 0; visibility: hidden; transition: 0.3s; }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .sidebar { position: absolute; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card-bg); z-index: 201; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; box-shadow: 5px 0 20px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        
        .sidebar-header { padding: 35px 20px 20px; background: #0a0a0f; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-avatar { width: 65px; height: 65px; border-radius: 50%; background: var(--card-bg); display: flex; justify-content: center; align-items: center; font-size: 26px; color: var(--text-muted); margin-bottom: 12px; border: 2px dashed var(--text-muted); }
        .sidebar-header h3 { font-size: 18px; color: var(--text-main); display: flex; align-items: center; gap: 8px;}
        .sidebar-header p { font-size: 14px; color: var(--accent-cyan); margin-top: 4px; font-weight: 500;}
        
        .sidebar-menu { padding: 15px 0; overflow-y: auto; }
        .sidebar-item { padding: 16px 25px; display: flex; align-items: center; gap: 15px; color: var(--text-main); font-size: 15px; cursor: pointer; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); text-decoration: none; }
        .sidebar-item:active { transform: scale(0.95); background: rgba(255,255,255,0.02); }
        .sidebar-item i { width: 20px; text-align: center; font-size: 18px; }

        /* --- 3. GLASS HEADER --- */
        .glass-header {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;
            background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 50;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { font-size: 22px; cursor: pointer; color: var(--text-main); transition: 0.2s; }
        .menu-btn:active { transform: scale(0.8); }
        .brand h2 { font-size: 22px; font-weight: 800; font-style: italic; letter-spacing: 0.5px; color: white;}
        .brand .dot { color: var(--accent-cyan); /* Swapped to Cyan for Explore theme */ }
        .header-icons i { font-size: 20px; margin-left: 20px; cursor: pointer; color: var(--text-main); transition: 0.2s; }
        .header-icons i:active { transform: scale(0.8); }

        /* --- 4. SCROLLABLE CONTENT AREA --- */
        .content-area { 
            flex: 1; overflow-y: auto; padding-top: 75px; padding-bottom: 100px; scrollbar-width: none; 
        }
        .content-area::-webkit-scrollbar { display: none; }

        /* --- 5. EXPLORE SEARCH & CHIPS --- */
        .search-container { padding: 5px 15px 10px; position: sticky; top: 0; background: var(--bg-deep); z-index: 10; }
        .search-bar { background: var(--card-bg); border-radius: 20px; padding: 12px 18px; display: flex; align-items: center; gap: 12px; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.02); }
        .search-bar input { background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 15px; }

        /* Horizontal Filter Chips */
        .chips-container { display: flex; gap: 10px; padding: 5px 15px 15px; overflow-x: auto; scrollbar-width: none; }
        .chips-container::-webkit-scrollbar { display: none; }
        .chip { 
            background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05);
            padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; white-space: nowrap;
            cursor: pointer; transition: 0.3s;
        }
        .chip.active { background: var(--text-main); color: var(--bg-deep); border-color: transparent; }
        .chip:active { transform: scale(0.9); }

        /* --- 6. MASONRY GRID & SKELETONS --- */
        .explore-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); grid-gap: 12px; padding: 0 15px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid-item { 
            position: relative; border-radius: 16px; overflow: hidden; background: var(--card-bg);
            aspect-ratio: 4 / 5; cursor: pointer; border: 1px solid rgba(255,255,255,0.02);
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 12px;
        }
        .grid-item:active { transform: scale(0.95); }
        .grid-item.large { aspect-ratio: 1 / 1; grid-column: span 2; }
        
        .grid-gradient-1 { background: linear-gradient(135deg, #1A2980, #26D0CE); }
        .grid-gradient-2 { background: linear-gradient(135deg, #FF416C, #FF4B2B); }
        .grid-gradient-3 { background: linear-gradient(135deg, #8E2DE2, #4A00E0); }
        .grid-gradient-4 { background: linear-gradient(135deg, #f12711, #f5af19); }

        .grid-info { position: relative; z-index: 2; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .grid-info h4 { color: white; font-size: 15px; margin-bottom: 2px; }
        .grid-info p { color: rgba(255,255,255,0.8); font-size: 12px; display: flex; align-items: center; gap: 5px; }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, #121218 25%, #1a1a24 50%, #121218 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- 7. BOTTOM NAVIGATION & EXTRA FEATURES --- */
        .nav-wrapper { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        
        .bottom-nav { 
            width: 90%; max-width: 420px; background: rgba(18, 18, 24, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 25px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); pointer-events: auto;
            position: relative;
        }
        
        .nav-item { 
            color: var(--text-muted); font-size: 22px; padding: 8px; text-decoration: none; 
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); 
            display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative;
        }
        
        .nav-item:active { transform: scale(0.75); color: var(--text-main); } 
        
        /* Active State for Explore */
        .nav-item.active { color: var(--accent-cyan); text-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; width: 4px; height: 4px; background: var(--accent-cyan); border-radius: 50%; }

        /* EXTRA FEATURE: Floating Radar Button */
        .radar-fab {
            position: absolute; right: 20px; bottom: 90px; /* Sits right above the island */
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(18, 18, 24, 0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--accent-cyan); color: var(--accent-cyan);
            display: flex; justify-content: center; align-items: center; font-size: 20px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); pointer-events: auto;
            cursor: pointer; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 99;
        }
        .radar-fab:active { transform: scale(0.85); background: var(--accent-cyan); color: #000; }
        .radar-pulse {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid var(--accent-cyan); opacity: 0; animation: radarPulse 2s infinite;
        }
        @keyframes radarPulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.8); opacity: 0; } }

    </style>
</head>
<body>

<div class="app-container">

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-avatar" id="user-profile-pic"><i class="fa-solid fa-user"></i></div>
            <h3 id="user-display-name">Your Profile</h3>
            <p id="user-handle">@username</p>
        </div>
        <div class="sidebar-menu">
            <a href="profile.html" class="sidebar-item"><i class="fa-regular fa-circle-user"></i> My Profile</a>
            <a href="network.html" class="sidebar-item"><i class="fa-solid fa-users"></i> Network Hub</a>
            <a href="saved.html" class="sidebar-item"><i class="fa-regular fa-bookmark"></i> Saved Content</a>
            <a href="analytics.html" class="sidebar-item"><i class="fa-solid fa-chart-simple"></i> Analytics</a>
            <a href="settings.html" class="sidebar-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-left">
            <i class="fa-solid fa-bars menu-btn" onclick="toggleSidebar()"></i>
            <div class="brand"><h2>Explore<span class="dot">.</span></h2></div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-qrcode"></i>
        </div>
    </header>

    <main class="content-area">
        
        <div class="search-container">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search people, tags, vibes...">
            </div>
        </div>

        <div class="chips-container" id="filterChips">
            <div class="chip active" onclick="activateChip(this)">For You</div>
            <div class="chip" onclick="activateChip(this)">Trending 🔥</div>
            <div class="chip" onclick="activateChip(this)">Networking</div>
            <div class="chip" onclick="activateChip(this)">Romance ❤️</div>
            <div class="chip" onclick="activateChip(this)">Motivation</div>
        </div>

        <div class="explore-grid" id="skeleton-grid">
            <div class="grid-item skeleton"></div>
            <div class="grid-item skeleton"></div>
            <div class="grid-item large skeleton"></div>
            <div class="grid-item skeleton"></div>
            <div class="grid-item skeleton"></div>
        </div>

        <div class="explore-grid" id="explore-content" style="display: none;">
            </div>

    </main>

    <div class="radar-fab" onclick="alert('Scanning for active vibes nearby...')">
        <div class="radar-pulse"></div>
        <i class="fa-solid fa-satellite-dish"></i>
    </div>

    <div class="nav-wrapper">
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
            <a href="explore.html" class="nav-item active"><i class="fa-regular fa-compass"></i></a>
            <a href="reels.html" class="nav-item"><i class="fa-solid fa-play"></i></a>
            <a href="network.html" class="nav-item"><i class="fa-solid fa-user-group"></i></a>
            <a href="profile.html" class="nav-item"><i class="fa-regular fa-circle-user"></i></a>
        </nav>
    </div>

</div>

<script>
    // --- Sidebar Toggle ---
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function toggleSidebar() {
        sidebar.classList.toggle('active');
        sidebarOverlay.classList.toggle('active');
    }

    // --- Chip Filter Toggle ---
    function activateChip(element) {
        document.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
        element.classList.add('active');
        fetchExploreData(); // Re-trigger skeleton loading when changing filters
    }

    // --- Explore Data Fetching Simulator ---
    document.addEventListener("DOMContentLoaded", () => {
        // Load User Profile Data from Login
        const savedAlias = localStorage.getItem("blendr_user");
        if (savedAlias) {
            document.getElementById("user-display-name").textContent = "Welcome Back";
            document.getElementById("user-handle").textContent = savedAlias;
            document.getElementById("user-profile-pic").innerHTML = savedAlias.charAt(0).toUpperCase();
        }

        // Fetch Explore Data
        fetchExploreData();
    });

    function fetchExploreData() {
        const skeletonGrid = document.getElementById('skeleton-grid');
        const contentGrid = document.getElementById('explore-content');
        
        // Show Skeletons
        skeletonGrid.style.display = 'grid';
        contentGrid.style.display = 'none';

        // Simulate Database Fetch from Apps Script
        setTimeout(() => {
            const exploreData = [
                { title: "UI/UX Designers Hub", subtitle: "2.4k Members", class: "grid-gradient-1 large", icon: "fa-pen-nib" },
                { title: "Venting Space", subtitle: "Anonymous", class: "grid-gradient-2", icon: "fa-heart-crack" },
                { title: "Tech Startups", subtitle: "Networking", class: "grid-gradient-3", icon: "fa-rocket" },
                { title: "Daily Motivation", subtitle: "Trending", class: "grid-gradient-4", icon: "fa-fire" },
                { title: "Local Gamers", subtitle: "Connect", class: "grid-gradient-1", icon: "fa-gamepad" }
            ];

            let html = "";
            exploreData.forEach(item => {
                html += `
                    <div class="grid-item ${item.class}" onclick="alert('Opening ${item.title}...')">
                        <div class="grid-info">
                            <h4>${item.title}</h4>
                            <p><i class="fa-solid ${item.icon}"></i> ${item.subtitle}</p>
                        </div>
                    </div>
                `;
            });

            contentGrid.innerHTML = html;
            skeletonGrid.style.display = 'none';
            contentGrid.style.display = 'grid';
        }, 1200); // 1.2s delay to show off the skeleton loading
    }
</script>
</body>
</html>
