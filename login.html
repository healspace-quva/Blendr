<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blendr | Enter the Ecosystem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. BASE & THEMES --- */
        :root {
            --bg-deep: #050508;
            --card-bg: rgba(18, 18, 24, 0.75);
            --accent-pink: #ff2a7a;
            --accent-cyan: #00e5ff;
            --accent-yellow: #ffc107;
            --text-main: #ffffff;
            --text-muted: #8b8b99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-deep); 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; 
            background-image: radial-gradient(circle at 50% -10%, #1a1a2e 0%, #050508 60%);
        }

        .app-container {
            width: 100%; max-width: 450px; padding: 25px;
            display: flex; flex-direction: column; align-items: center;
            position: relative; overflow: hidden;
        }

        /* --- 2. BRANDING --- */
        .brand-container { text-align: center; margin-bottom: 30px; animation: slideDown 0.8s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        
        .brand-icon { 
            width: 70px; height: 70px; border-radius: 22px; 
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan));
            display: flex; justify-content: center; align-items: center;
            font-size: 35px; color: white; margin: 0 auto 10px;
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.3); transform: rotate(-10deg);
        }
        .brand-title { font-size: 28px; font-weight: 900; font-style: italic; color: white; letter-spacing: 1px;}
        .brand-title .dot { color: var(--accent-pink); }
        .brand-subtitle { color: var(--text-muted); font-size: 13px; margin-top: 5px; }

        /* --- 3. GLASSMORPHISM PANELS --- */
        .panel-container {
            width: 100%; position: relative; height: 350px; /* Fixed height for smooth transitions */
        }

        .glass-panel {
            width: 100%; background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 30px 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: absolute; top: 0; left: 0;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* State Classes for Sliding */
        .panel-hidden-left { transform: translateX(-120%); opacity: 0; pointer-events: none; }
        .panel-active { transform: translateX(0); opacity: 1; pointer-events: auto; z-index: 10; }
        .panel-hidden-right { transform: translateX(120%); opacity: 0; pointer-events: none; }

        /* --- 4. FORM INPUTS --- */
        .input-group { margin-bottom: 18px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 16px; color: var(--text-muted); font-size: 16px; }
        .input-field, .select-field {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 15px 14px 45px; border-radius: 16px; color: white; font-size: 14px;
            outline: none; transition: 0.3s; appearance: none;
        }
        .input-field:focus, .select-field:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 229, 255, 0.15); }
        .select-field option { background: var(--bg-deep); color: white; }

        .row-inputs { display: flex; gap: 10px; }

        /* --- 5. BUTTONS & ACTIONS --- */
        .action-btn {
            width: 100%; background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan));
            border: none; padding: 15px; border-radius: 16px; color: white; font-size: 15px; font-weight: bold;
            cursor: pointer; box-shadow: 0 8px 20px rgba(255, 42, 122, 0.3); transition: 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .action-btn:active { transform: scale(0.96); }
        
        .secondary-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); box-shadow: none; color: white;
        }

        .auth-links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 12px; font-weight: bold; }
        .auth-links span { color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .auth-links span:hover { color: var(--accent-cyan); }

        /* Progress Dots for Signup */
        .progress-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); transform: scale(1.2); }

        /* Loader & Toasts */
        .spinner { display: none; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(255, 42, 122, 0.95); color: white; padding: 12px 25px; border-radius: 30px; font-size: 13px; font-weight: bold; opacity: 0; transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 1000; text-align: center; width: 90%; max-width: 350px;}
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: rgba(0, 229, 255, 0.95); }
    </style>
</head>
<body>

    <div class="toast" id="systemToast">Notification</div>

    <div class="app-container">
        
        <div class="brand-container">
            <div class="brand-icon"><i class="fa-solid fa-bolt"></i></div>
            <div class="brand-title">Blendr<span class="dot">.</span></div>
            <div class="brand-subtitle">The Ultimate Ecosystem</div>
        </div>

        <div class="panel-container">
            
            <div class="glass-panel panel-active" id="loginPanel">
                <div class="input-group">
                    <i class="fa-solid fa-at"></i>
                    <input type="text" id="loginUser" class="input-field" placeholder="Username" autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPass" class="input-field" placeholder="Passcode">
                </div>
                <button class="action-btn" onclick="processLogin()">
                    <span id="loginBtnText">Access Account</span>
                    <div class="spinner" id="loginSpinner"></div>
                </button>
                <div class="auth-links">
                    <span>Forgot Passcode?</span>
                    <span style="color: var(--accent-cyan);" onclick="switchPanel('signupStep1')">Create Account</span>
                </div>
            </div>

            <div class="glass-panel panel-hidden-right" id="signupStep1">
                <div class="progress-dots">
                    <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
                </div>
                <h3 style="color: white; font-size: 16px; margin-bottom: 15px; text-align: center;">Choose your Alias</h3>
                
                <div class="input-group">
                    <i class="fa-solid fa-mask"></i>
                    <input type="text" id="regAlias" class="input-field" placeholder="e.g. @creator_tj" autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="regPass" class="input-field" placeholder="Create Passcode">
                </div>

                <div class="row-inputs">
                    <button class="action-btn secondary-btn" onclick="switchPanel('loginPanel')"><i class="fa-solid fa-arrow-left"></i></button>
                    <button class="action-btn" onclick="validateStep1()">Next <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div class="glass-panel panel-hidden-right" id="signupStep2">
                <div class="progress-dots">
                    <div class="dot"></div><div class="dot active"></div><div class="dot"></div>
                </div>
                <h3 style="color: white; font-size: 16px; margin-bottom: 15px; text-align: center;">The Basics</h3>
                
                <div class="row-inputs">
                    <div class="input-group" style="flex: 1;">
                        <i class="fa-solid fa-cake-candles"></i>
                        <input type="number" id="regAge" class="input-field" placeholder="Age" min="16" max="99">
                    </div>
                    <div class="input-group" style="flex: 1.5;">
                        <i class="fa-solid fa-venus-mars"></i>
                        <select id="regGender" class="select-field">
                            <option value="" disabled selected>Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-compass"></i>
                    <select id="regLookingFor" class="select-field">
                        <option value="" disabled selected>Looking For...</option>
                        <option value="Networking">Networking & Collabs</option>
                        <option value="Friendship">Friendship & Vibes</option>
                        <option value="Dating">Dating & Romance</option>
                    </select>
                </div>

                <div class="row-inputs">
                    <button class="action-btn secondary-btn" onclick="switchPanel('signupStep1')"><i class="fa-solid fa-arrow-left"></i></button>
                    <button class="action-btn" onclick="validateStep2()">Next <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div class="glass-panel panel-hidden-right" id="signupStep3">
                <div class="progress-dots">
                    <div class="dot"></div><div class="dot"></div><div class="dot active"></div>
                </div>
                <h3 style="color: white; font-size: 16px; margin-bottom: 15px; text-align: center;">Vibe Check</h3>
                
                <div class="input-group">
                    <i class="fa-solid fa-comments"></i>
                    <select id="regComm" class="select-field">
                        <option value="" disabled selected>Communication Style</option>
                        <option value="Texting">Heavy Texter</option>
                        <option value="Calling">Voice/Video Caller</option>
                        <option value="Memes">Just Memes & Reels</option>
                    </select>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-battery-half"></i>
                    <select id="regBattery" class="select-field">
                        <option value="" disabled selected>Social Battery</option>
                        <option value="Introvert">Introvert (Drains fast)</option>
                        <option value="Extrovert">Extrovert (Always ready)</option>
                        <option value="Ambivert">Ambivert (Depends)</option>
                    </select>
                </div>

                <div class="row-inputs">
                    <button class="action-btn secondary-btn" onclick="switchPanel('signupStep2')"><i class="fa-solid fa-arrow-left"></i></button>
                    <button class="action-btn" onclick="processSignup()">
                        <span id="regBtnText">Join Blendr</span>
                        <div class="spinner" id="regSpinner"></div>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. Auto-Login Check ---
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("blendr_user")) {
                window.location.href = "index.html"; 
            }
        });

        // --- 2. Panel Sliding Animation Logic ---
        const panels = ['loginPanel', 'signupStep1', 'signupStep2', 'signupStep3'];
        
        function switchPanel(targetPanelId) {
            let targetIndex = panels.indexOf(targetPanelId);
            
            panels.forEach((id, index) => {
                let panel = document.getElementById(id);
                panel.classList.remove('panel-active', 'panel-hidden-left', 'panel-hidden-right');
                
                if (index === targetIndex) {
                    panel.classList.add('panel-active');
                } else if (index < targetIndex) {
                    panel.classList.add('panel-hidden-left'); // Slide out to the left
                } else {
                    panel.classList.add('panel-hidden-right'); // Hide on the right
                }
            });
        }

        // --- 3. Step Validations ---
        function validateStep1() {
            if(!document.getElementById('regAlias').value || !document.getElementById('regPass').value) {
                showToast("Alias and Passcode are required.", false);
                return;
            }
            switchPanel('signupStep2');
        }

        function validateStep2() {
            if(!document.getElementById('regAge').value || !document.getElementById('regGender').value || !document.getElementById('regLookingFor').value) {
                showToast("Please fill out all basic info.", false);
                return;
            }
            switchPanel('signupStep3');
        }

        // --- 4. Google Apps Script Integrations ---
        // (You will replace this URL when you publish your Apps Script)
        const APPS_SCRIPT_URL = "YOUR_WEB_APP_URL_HERE"; 

        async function processLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            
            if(!user || !pass) return showToast("Enter Alias and Passcode.", false);

            document.getElementById('loginBtnText').style.display = "none";
            document.getElementById('loginSpinner').style.display = "block";

            // Simulated Backend Fetch (Replace with actual fetch later)
            setTimeout(() => {
                localStorage.setItem("blendr_user", user);
                showToast(`Welcome back, ${user}!`, true);
                setTimeout(() => window.location.href = "index.html", 1000);
            }, 1500);
        }

        async function processSignup() {
            const alias = document.getElementById('regAlias').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const age = document.getElementById('regAge').value;
            const gender = document.getElementById('regGender').value;
            const lookingFor = document.getElementById('regLookingFor').value;
            const comm = document.getElementById('regComm').value;
            const battery = document.getElementById('regBattery').value;

            if(!comm || !battery) return showToast("Please complete the Vibe Check.", false);

            document.getElementById('regBtnText').style.display = "none";
            document.getElementById('regSpinner').style.display = "block";

            // Simulated Backend Fetch for saving user to Google Sheets
            let userDataToSave = {
                action: 'register',
                alias: alias, passcode: pass, age: age, gender: gender, 
                lookingFor: lookingFor, communication: comm, battery: battery,
                avatarGrad: "grad-" + (Math.floor(Math.random() * 3) + 1) // Random color 1,2, or 3
            };

            setTimeout(() => {
                // Save user data locally so profile.html can use it!
                localStorage.setItem("blendr_user", alias);
                localStorage.setItem("blendr_userData", JSON.stringify(userDataToSave));
                
                showToast("Account Created Successfully!", true);
                setTimeout(() => window.location.href = "index.html", 1000);
            }, 2000);
        }

        // --- 5. UI Toast Notifications ---
        function showToast(msg, isSuccess) {
            const toast = document.getElementById('systemToast');
            toast.textContent = msg;
            
            if(isSuccess) toast.classList.add('success');
            else toast.classList.remove('success');

            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);

            // Reset spinners just in case it was an error
            document.getElementById('loginBtnText').style.display = "block";
            document.getElementById('loginSpinner').style.display = "none";
            document.getElementById('regBtnText').style.display = "block";
            document.getElementById('regSpinner').style.display = "none";
        }
    </script>
</body>
</html>
