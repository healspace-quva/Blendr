<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blendr | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #000000; --card-bg: #121212; --accent-pink: #ff2a7a; --accent-cyan: #00e5ff;
            --text-main: #ffffff; --text-muted: #8b8b99; --wa-green: #25D366; --border-color: #262626;
            --chat-bg: #0a0a0f; --msg-sent: linear-gradient(135deg, #ff2a7a, #ff5e00); --msg-recv: #1e1e26;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); display: flex; justify-content: center; height: 100dvh; overflow: hidden; color: var(--text-main); }
        .app-container { width: 100%; max-width: 550px; height: 100%; background: var(--bg-deep); position: relative; display: flex; flex-direction: column; overflow: hidden; }

        /* Header & Logo */
        .glass-header { position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 50; border-bottom: 1px solid var(--border-color); }
        .brand { display: flex; align-items: center; gap: 8px; font-size: 22px; font-weight: 900; font-style: italic; }
        .brand-icon { background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px;}
        .brand .dot { color: var(--accent-pink); }
        .header-icons i { font-size: 22px; cursor: pointer; transition: 0.2s; }
        .header-icons i:active { transform: scale(0.8); }
        
        .content-area { flex: 1; overflow-y: auto; padding-top: 75px; padding-bottom: 90px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }

        /* Social Stories */
        .stories-row { display: flex; gap: 15px; padding: 10px 15px 20px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border-color); margin-bottom: 10px;}
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 65px; cursor: pointer; transition: 0.2s; }
        .story-item:active { transform: scale(0.9); }
        .story-ring { width: 64px; height: 64px; border-radius: 50%; padding: 3px; display: flex; justify-content: center; align-items: center; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .story-ring.add { background: transparent; border: 2px dashed var(--text-muted); color: var(--text-muted); font-size: 20px; }
        .story-inner { width: 100%; height: 100%; border-radius: 50%; background: var(--bg-deep); border: 2px solid var(--bg-deep); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; overflow: hidden;}
        .story-item span { font-size: 12px; font-weight: 500; }

        /* Messenger Chat List */
        .chat-list { display: flex; flex-direction: column; gap: 2px; }
        .chat-card { display: flex; align-items: center; padding: 14px 15px; background: transparent; gap: 15px; cursor: pointer; transition: 0.2s; }
        .chat-card:active { background: #1a1a1a; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; flex-shrink: 0; background: linear-gradient(135deg, #2b5876, #4e4376); }
        .chat-info { flex: 1; overflow: hidden; border-bottom: 1px solid var(--border-color); padding-bottom: 14px; }
        .chat-card:last-child .chat-info { border-bottom: none; }
        .chat-info-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .chat-info h4 { font-size: 15px; font-weight: 600; }
        .chat-info p { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .time { font-size: 12px; color: var(--text-muted); }

        /* Bottom Nav */
        .nav-wrapper { position: absolute; bottom: 0; left: 0; width: 100%; background: var(--bg-deep); border-top: 1px solid var(--border-color); display: flex; justify-content: center; z-index: 100; }
        .bottom-nav { width: 100%; max-width: 550px; display: flex; justify-content: space-around; align-items: center; padding: 15px 10px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .nav-item { color: var(--text-main); font-size: 22px; transition: 0.2s; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-item:active { transform: scale(0.8); }
        .nav-item i { transition: 0.2s; }
        .nav-item:not(.active) i { color: var(--text-muted); font-weight: 400; }

    </style>
</head>
<body>

<div class="app-container">

    <header class="glass-header">
        <div class="brand">
            <i class="fa-solid fa-infinity brand-icon"></i>
            Blendr<span class="dot">.</span>
        </div>
        <div class="header-icons" style="display: flex; gap: 20px;">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-brands fa-facebook-messenger" onclick="alert('Opening new message...')"></i>
        </div>
    </header>

    <main class="content-area">
        
        <div class="stories-row" id="stories-container">
            <div class="story-item">
                <div class="story-ring add"><i class="fa-solid fa-plus"></i></div>
                <span style="color: var(--text-muted);">Your Note</span>
            </div>
            <div class="story-item">
                <div class="story-ring"><div class="story-inner">A</div></div>
                <span>Alex</span>
            </div>
            <div class="story-item">
                <div class="story-ring"><div class="story-inner">S</div></div>
                <span>Sarah</span>
            </div>
            <div class="story-item">
                <div class="story-ring"><div class="story-inner">T</div></div>
                <span>TechBro</span>
            </div>
        </div>

        <div class="chat-list" id="real-contact-list">
            
            <div class="chat-card" onclick="alert('Opening Chat with Sarah...')">
                <div class="chat-avatar" style="background: linear-gradient(135deg, #ff2a7a, #ff5e00);">S</div>
                <div class="chat-info">
                    <div class="chat-info-top">
                        <h4>Sarah Connor</h4>
                        <span class="time">Just now</span>
                    </div>
                    <p style="color: var(--text-main); font-weight: 600;">Sent a reel by Blendr 🚀</p>
                </div>
            </div>

            <div class="chat-card">
                <div class="chat-avatar">G</div>
                <div class="chat-info">
                    <div class="chat-info-top">
                        <h4>Global Network</h4>
                        <span class="time">10:42 AM</span>
                    </div>
                    <p>Welcome to the ultimate ecosystem...</p>
                </div>
            </div>

            <div class="chat-card">
                <div class="chat-avatar" style="background: linear-gradient(135deg, #00B4DB, #0083B0);">D</div>
                <div class="chat-info">
                    <div class="chat-info-top">
                        <h4>David Design</h4>
                        <span class="time">Yesterday</span>
                    </div>
                    <p>Reacted ❤️ to your message</p>
                </div>
            </div>

        </div>
    </main>

    <div class="nav-wrapper">
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item active"><i class="fa-solid fa-house"></i></a>
            <a href="explore.html" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a href="reels.html" class="nav-item"><i class="fa-solid fa-clapperboard"></i></a>
            <a href="network.html" class="nav-item"><i class="fa-solid fa-users"></i></a>
            <a href="profile.html" class="nav-item"><i class="fa-solid fa-circle-user"></i></a>
        </nav>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Redirect to Login if no session
        if (!localStorage.getItem("blendr_user")) {
            window.location.href = "login.html";
        }
    });
</script>
</body>
</html>
