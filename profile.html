<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blendr | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. BASE & THEME VARIABLES --- */
        :root {
            --bg-deep: #050508;
            --card-bg: #121218;
            --accent-pink: #ff2a7a;
            --accent-cyan: #00e5ff;
            --accent-yellow: #ffc107;
            --text-main: #ffffff;
            --text-muted: #8b8b99;
            --wa-green: #25D366;
            --ig-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #000; display: flex; justify-content: center; 
            height: 100vh; height: 100dvh; overflow: hidden; 
        }

        .app-container {
            width: 100%; max-width: 550px; height: 100%;
            background-color: var(--bg-deep); position: relative;
            display: flex; flex-direction: column; 
        }

        /* --- 2. SIDEBAR --- */
        .sidebar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; opacity: 0; visibility: hidden; transition: 0.3s; }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .sidebar { position: absolute; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card-bg); z-index: 201; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; box-shadow: 5px 0 20px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 35px 20px 20px; background: #0a0a0f; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-avatar { width: 65px; height: 65px; border-radius: 50%; background: var(--card-bg); display: flex; justify-content: center; align-items: center; font-size: 26px; color: var(--text-muted); margin-bottom: 12px; border: 2px dashed var(--text-muted); }
        .sidebar-header h3 { font-size: 18px; color: var(--text-main); display: flex; align-items: center; gap: 8px;}
        .sidebar-header p { font-size: 14px; color: var(--accent-cyan); margin-top: 4px; font-weight: 500;}
        .sidebar-menu { padding: 15px 0; overflow-y: auto; }
        .sidebar-item { padding: 16px 25px; display: flex; align-items: center; gap: 15px; color: var(--text-main); font-size: 15px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .sidebar-item:active { transform: scale(0.95); background: rgba(255,255,255,0.02); }
        .sidebar-item i { width: 20px; text-align: center; font-size: 18px; }

        /* --- 3. GLASS HEADER --- */
        .glass-header {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;
            background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 50;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { font-size: 22px; cursor: pointer; color: var(--text-main); transition: 0.2s; }
        .menu-btn:active { transform: scale(0.8); }
        .brand h2 { font-size: 22px; font-weight: 800; color: white; letter-spacing: 0.5px;}
        .header-icons i { font-size: 20px; margin-left: 20px; cursor: pointer; color: var(--text-main); transition: 0.2s; background: var(--card-bg); padding: 10px; border-radius: 50%; }
        .header-icons i:active { transform: scale(0.8); }

        /* --- 4. SCROLLABLE CONTENT AREA --- */
        .content-area { 
            flex: 1; overflow-y: auto; padding-top: 80px; padding-bottom: 100px; scrollbar-width: none; 
            animation: fadeIn 0.5s ease;
        }
        .content-area::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 5. PROFILE UI (Matches your screenshot) --- */
        .profile-header-center { text-align: center; margin-bottom: 25px; }
        .profile-ring-main { 
            width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent-yellow); 
            display: flex; justify-content: center; align-items: center; margin: 0 auto 15px; 
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.2); font-size: 35px; color: var(--accent-yellow); position: relative; 
        }
        .edit-badge { position: absolute; bottom: 0px; right: 0px; background: white; color: black; width: 26px; height: 26px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); transition: 0.2s; }
        .edit-badge:active { transform: scale(0.8); }
        .profile-name { font-size: 26px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; color: white;}
        .role-badge { border: 1px solid var(--accent-yellow); color: var(--accent-yellow); padding: 5px 18px; border-radius: 20px; font-size: 11px; font-weight: 800; display: inline-block; margin-bottom: 12px; letter-spacing: 1px;}
        .status-badge { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 6px 16px; border-radius: 20px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-weight: bold;}

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 0 20px 25px; }
        .stat-box { background: var(--card-bg); padding: 22px; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.02); }
        .stat-box h3 { font-size: 28px; margin-bottom: 5px; color: white; }
        .stat-box p { font-size: 11px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}

        /* Ghost Mode Toggle */
        .ghost-card { background: var(--card-bg); padding: 18px 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin: 0 20px 25px; border: 1px solid rgba(255,255,255,0.02); }
        .ghost-left { display: flex; align-items: center; gap: 15px; }
        .ghost-icon { width: 40px; height: 40px; background: rgba(138, 43, 226, 0.15); color: #b28dff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s cubic-bezier(0.25, 0.8, 0.25, 1); border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s cubic-bezier(0.25, 0.8, 0.25, 1); border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        input:checked + .slider { background-color: white; }
        input:checked + .slider:before { transform: translateX(24px); background-color: #000; }

        /* Settings Lists */
        .section-title { font-size: 12px; color: var(--text-muted); font-weight: 800; letter-spacing: 1.5px; margin: 0 0 10px 25px; text-transform: uppercase; }
        .settings-list { background: var(--card-bg); border-radius: 18px; padding: 5px 0; margin: 0 20px 25px; border: 1px solid rgba(255,255,255,0.02); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; color: var(--text-main); font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .setting-item:active { background: rgba(255,255,255,0.02); }
        .setting-item:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.02); }
        .setting-item-left { display: flex; align-items: center; gap: 15px; }
        .setting-value { color: var(--text-muted); font-size: 14px; margin-right: 10px; }

        /* Logout Button */
        .logout-btn { margin: 0 20px; background: rgba(255, 42, 122, 0.1); color: var(--accent-pink); border: 1px solid rgba(255, 42, 122, 0.3); padding: 16px; border-radius: 18px; text-align: center; font-weight: bold; cursor: pointer; transition: 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .logout-btn:active { transform: scale(0.96); background: var(--accent-pink); color: white; }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, #121218 25%, #1a1a24 50%, #121218 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; color: transparent !important; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- 6. BOTTOM NAVIGATION --- */
        .nav-wrapper { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        .bottom-nav { width: 90%; max-width: 420px; background: rgba(18, 18, 24, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 15px 35px rgba(0,0,0,0.8); pointer-events: auto; }
        .nav-item { color: var(--text-muted); font-size: 22px; padding: 8px; text-decoration: none; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .nav-item:active { transform: scale(0.75); color: var(--text-main); } 
        /* Active State for Profile */
        .nav-item.active { color: var(--accent-pink); text-shadow: 0 0 15px rgba(255, 42, 122, 0.4); }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; width: 4px; height: 4px; background: var(--accent-pink); border-radius: 50%; }

    </style>
</head>
<body>

<div class="app-container">

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-avatar" id="drawer-initial"><i class="fa-solid fa-user"></i></div>
            <h3 id="drawer-name">Your Profile</h3>
            <p id="drawer-handle">@username</p>
        </div>
        <div class="sidebar-menu">
            <a href="profile.html" class="sidebar-item" style="color: var(--accent-cyan);"><i class="fa-regular fa-circle-user"></i> My Profile</a>
            <a href="network.html" class="sidebar-item"><i class="fa-solid fa-users"></i> Network Hub</a>
            <a href="saved.html" class="sidebar-item"><i class="fa-regular fa-bookmark"></i> Saved Content</a>
            <a href="analytics.html" class="sidebar-item"><i class="fa-solid fa-chart-simple"></i> Analytics</a>
            <a href="settings.html" class="sidebar-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-left">
            <i class="fa-solid fa-bars menu-btn" onclick="toggleSidebar()"></i>
            <div class="brand"><h2>Account</h2></div>
        </div>
        <div class="header-icons">
            <i class="fa-regular fa-bell"></i>
        </div>
    </header>

    <main class="content-area">
        
        <div class="profile-header-center">
            <div class="profile-ring-main">
                <i class="fa-solid fa-moon"></i>
                <div class="edit-badge"><i class="fa-solid fa-pen"></i></div>
            </div>
            <div class="profile-name">
                <span id="ui-alias" class="skeleton">Loading...</span> 
                <i class="fa-solid fa-chevron-right" style="font-size: 16px; color: var(--text-muted); cursor: pointer;"></i>
            </div>
            <div class="role-badge">MEMBER</div><br>
            <div class="status-badge"><i class="fa-solid fa-face-smile" style="color: var(--accent-yellow);"></i> <span id="ui-status">Online</span></div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <h3 id="stat-conn">12</h3>
                <p>Connections</p>
            </div>
            <div class="stat-box">
                <h3><span id="stat-time">4</span><span style="font-size: 16px; color: var(--text-muted);">h</span></h3>
                <p>Time Healed</p>
            </div>
        </div>

        <div class="ghost-card">
            <div class="ghost-left">
                <div class="ghost-icon"><i class="fa-solid fa-ghost"></i></div>
                <div>
                    <h4 style="font-size: 15px; margin-bottom: 3px; color: white;">Ghost Mode</h4>
                    <p style="font-size: 12px; color: var(--text-muted);">Stealth online status.</p>
                </div>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="ghostToggle" onchange="toggleGhostMode()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="section-title">The Basics</div>
        <div class="settings-list">
            <div class="setting-item">
                <div class="setting-item-left"><i class="fa-solid fa-mask" style="color: var(--accent-yellow); width: 20px;"></i> Alias</div>
                <div><span class="setting-value" id="val-alias" class="skeleton">--</span> <i class="fa-solid fa-chevron-right" style="color: rgba(255,255,255,0.1); font-size: 12px;"></i></div>
            </div>
            <div class="setting-item">
                <div class="setting-item-left"><i class="fa-solid fa-cake-candles" style="color: var(--accent-pink); width: 20px;"></i> Age</div>
                <div><span class="setting-value" id="val-age" class="skeleton">--</span> <i class="fa-solid fa-chevron-right" style="color: rgba(255,255,255,0.1); font-size: 12px;"></i></div>
            </div>
            <div class="setting-item">
                <div class="setting-item-left"><i class="fa-solid fa-venus-mars" style="color: var(--accent-cyan); width: 20px;"></i> Gender</div>
                <div><span class="setting-value" id="val-gender" class="skeleton">--</span> <i class="fa-solid fa-chevron-right" style="color: rgba(255,255,255,0.1); font-size: 12px;"></i></div>
            </div>
            <div class="setting-item">
                <div class="setting-item-left"><i class="fa-solid fa-compass" style="color: #b28dff; width: 20px;"></i> Looking For</div>
                <div><span class="setting-value" id="val-looking" class="skeleton">--</span> <i class="fa-solid fa-chevron-right" style="color: rgba(255,255,255,0.1); font-size: 12px;"></i></div>
            </div>
        </div>
        
        <div class="section-title">Vibe Check</div>
        <div class="settings-list">
            <div class="setting-item">
                <div class="setting-item-left"><i class="fa-solid fa-comments" style="color: var(--wa-green); width: 20px;"></i> Communication</div>
                <div><span class="setting-value" id="val-comm" class="skeleton">--</span> <i class="fa-solid fa-chevron-right" style="color: rgba(255,255,255,0.1); font-size: 12px;"></i></div>
            </div>
            <div class="setting-item">
                <div class="setting-item-left"><i class="fa-solid fa-battery-half" style="color: var(--accent-yellow); width: 20px;"></i> Social Battery</div>
                <div><span class="setting-value" id="val-battery" class="skeleton">--</span> <i class="fa-solid fa-chevron-right" style="color: rgba(255,255,255,0.1); font-size: 12px;"></i></div>
            </div>
        </div>

        <div class="logout-btn" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </div>

    </main>

    <div class="nav-wrapper">
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
            <a href="explore.html" class="nav-item"><i class="fa-regular fa-compass"></i></a>
            <a href="reels.html" class="nav-item"><i class="fa-solid fa-play"></i></a>
            <a href="network.html" class="nav-item"><i class="fa-solid fa-user-group"></i></a>
            <a href="profile.html" class="nav-item active"><i class="fa-regular fa-circle-user"></i></a>
        </nav>
    </div>

</div>

<script>
    // --- Sidebar Toggle ---
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function toggleSidebar() {
        sidebar.classList.toggle('active');
        sidebarOverlay.classList.toggle('active');
    }

    // --- Load User Data Engine ---
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Fetch data saved during login.html
        const alias = localStorage.getItem("blendr_user");
        const rawData = localStorage.getItem("blendr_userData");
        
        // If no user is logged in, boot them to login
        if (!alias) {
            window.location.href = "login.html";
            return;
        }

        // 2. Parse the JSON data
        let userData = {};
        if(rawData) {
            userData = JSON.parse(rawData);
        } else {
            // Fallback if they bypassed signup step
            userData = { alias: alias, age: "N/A", gender: "N/A", lookingFor: "Vibes", communication: "Texting", battery: "Ambivert" };
        }

        // 3. Remove Skeletons & Inject Data into UI
        setTimeout(() => {
            // Header & Drawer
            document.getElementById("ui-alias").textContent = userData.alias;
            document.getElementById("ui-alias").classList.remove('skeleton');
            
            document.getElementById("drawer-name").textContent = "Welcome Back";
            document.getElementById("drawer-handle").textContent = userData.alias;
            document.getElementById("drawer-initial").textContent = userData.alias.charAt(1).toUpperCase(); // Skip the '@'

            // The Basics
            injectValue("val-alias", userData.alias);
            injectValue("val-age", userData.age);
            injectValue("val-gender", userData.gender);
            injectValue("val-looking", userData.lookingFor);

            // Vibe Check
            injectValue("val-comm", userData.communication);
            injectValue("val-battery", userData.battery);
            
            // Load Ghost Mode state
            const isGhost = localStorage.getItem("blendr_ghost_mode") === "true";
            document.getElementById("ghostToggle").checked = isGhost;
            updateStatusText(isGhost);

        }, 800); // Small delay to show off the skeleton loading effect
    });

    function injectValue(elementId, value) {
        const el = document.getElementById(elementId);
        el.textContent = value;
        el.classList.remove('skeleton');
    }

    // --- Ghost Mode Toggle Logic ---
    function toggleGhostMode() {
        const isChecked = document.getElementById("ghostToggle").checked;
        localStorage.setItem("blendr_ghost_mode", isChecked); // Save setting
        updateStatusText(isChecked);
    }

    function updateStatusText(isGhost) {
        const statusEl = document.getElementById("ui-status");
        if(isGhost) {
            statusEl.textContent = "Invisible";
            statusEl.style.color = "#b28dff";
        } else {
            statusEl.textContent = "Online";
            statusEl.style.color = "var(--text-muted)";
        }
    }

    // --- Logout Engine ---
    function logout() {
        if(confirm("Are you sure you want to log out?")) {
            // Clear all local storage
            localStorage.removeItem("blendr_user");
            localStorage.removeItem("blendr_userData");
            localStorage.removeItem("blendr_auth_token");
            localStorage.removeItem("blendr_ghost_mode");
            
            // Redirect to Login Gate
            window.location.href = "login.html";
        }
    }
</script>
</body>
</html>
