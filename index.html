<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blendr | Ultimate App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. BASE & THEME VARIABLES --- */
        :root {
            --bg-deep: #050508; --card-bg: #121218; --accent-pink: #ff2a7a; --accent-cyan: #00e5ff;
            --text-main: #ffffff; --text-muted: #8b8b99; --wa-green: #25D366;
            --chat-bg: #0a0a0f; --msg-sent: linear-gradient(135deg, #ff2a7a, #ff5e00); --msg-recv: #1e1e26;
        }

        .theme-ocean { --chat-bg: #001f3f; --msg-sent: linear-gradient(135deg, #00b4db, #0083b0); --msg-recv: #003366; }
        .theme-cyber { --chat-bg: #0d0221; --msg-sent: linear-gradient(135deg, #8E2DE2, #4A00E0); --msg-recv: #260c40; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Bulletproof Layout Fix */
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; }
        
        .app-container { 
            width: 100%; max-width: 550px; position: absolute; top: 0; bottom: 0; 
            background: var(--bg-deep); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- 2. SKELETON LOADING --- */
        .skeleton { background: linear-gradient(90deg, #121218 25%, #1a1a24 50%, #121218 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 10px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skel-card { display: flex; align-items: center; padding: 14px; gap: 15px; margin: 0 15px 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.02); }
        .skel-avatar { width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0; }
        .skel-line-1 { width: 60%; height: 16px; margin-bottom: 8px; }
        .skel-line-2 { width: 40%; height: 12px; }

        /* --- 3. MAIN UI ELEMENTS --- */
        .glass-header { position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(15px); z-index: 50; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand h2 { font-size: 24px; font-weight: 800; font-style: italic; color: white; letter-spacing: 0.5px;} .brand .dot { color: var(--accent-pink); }
        
        .content-area { position: absolute; top: 65px; bottom: 80px; width: 100%; overflow-y: auto; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }

        /* Sidebar Overlay & Drawer */
        .sidebar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; opacity: 0; visibility: hidden; transition: 0.3s; }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .sidebar { position: absolute; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card-bg); z-index: 201; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 35px 20px 20px; background: #0a0a0f; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Menu Logic Display */
        .menu-section { display: none; }
        .menu-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .sidebar-item { padding: 16px 25px; display: flex; align-items: center; gap: 15px; color: var(--text-main); font-size: 15px; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .sidebar-item:active { background: rgba(255,255,255,0.05); transform: scale(0.98); }
        .sidebar-item i { width: 20px; text-align: center; font-size: 18px; }

        /* Bottom Nav */
        .nav-wrapper { position: absolute; bottom: 15px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        .bottom-nav { width: 90%; max-width: 420px; background: rgba(18, 18, 24, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 15px 35px rgba(0,0,0,0.8); pointer-events: auto; }
        .nav-item { color: var(--text-muted); font-size: 22px; transition: 0.2s; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .nav-item.active { color: white; text-shadow: 0 0 15px rgba(255,255,255,0.4); transform: translateY(-2px); }

        /* --- 4. DATA FETCHING UI --- */
        .sync-btn-container { padding: 30px 20px; text-align: center; }
        .sync-btn { background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan)); border: none; padding: 16px 30px; border-radius: 30px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 25px rgba(0, 229, 255, 0.25); transition: 0.3s; width: 100%; }
        .sync-btn:active { transform: scale(0.95); }

        .section-title { font-size: 13px; color: var(--text-muted); font-weight: bold; letter-spacing: 1px; margin: 20px 0 10px 15px; text-transform: uppercase; }
        
        .chat-list { display: flex; flex-direction: column; gap: 12px; padding: 0 15px; }
        .chat-card { display: flex; align-items: center; padding: 14px; background: var(--card-bg); border-radius: 18px; gap: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .chat-card:active { transform: scale(0.96); background: #1a1a24; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; color: white; font-weight: bold; flex-shrink: 0; }
        
        /* Gradients for avatars */
        .grad-1 { background: linear-gradient(135deg, #00B4DB, #0083B0); }
        .grad-2 { background: linear-gradient(135deg, #8E2DE2, #4A00E0); }
        .grad-none { background: #2a2a35; color: var(--text-muted); border: 1px dashed var(--text-muted); }

        .chat-info { flex: 1; overflow: hidden; }
        .chat-info h4 { font-size: 16px; color: white; margin-bottom: 4px; }
        .chat-info p { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .action-btn { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: none; padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .action-btn.invite { color: var(--accent-pink); border: 1px solid rgba(255, 42, 122, 0.3); background: rgba(255, 42, 122, 0.05); }

        /* --- 5. SLIDE-IN CHAT BOX --- */
        .chat-overlay { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: var(--chat-bg); z-index: 300; transition: left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; }
        .chat-overlay.active { left: 0; }
        
        .chat-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-header-left { display: flex; align-items: center; gap: 15px; color: white; }
        .chat-header-left i { font-size: 20px; cursor: pointer; }
        
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; position: relative; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; position: relative; cursor: pointer; }
        .msg-wrapper.received { align-self: flex-start; }
        .msg-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        
        .msg-bubble { padding: 12px 16px; border-radius: 20px; font-size: 15px; color: white; position: relative; line-height: 1.4; transition: 0.2s; }
        .msg-wrapper.received .msg-bubble { background: var(--msg-recv); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-wrapper.sent .msg-bubble { background: var(--msg-sent); border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(255, 42, 122, 0.2); }
        
        .msg-context-menu { position: absolute; top: -50px; background: rgba(30,30,40,0.95); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 15px; display: none; gap: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.8); z-index: 10; align-items: center; }
        .msg-wrapper.active .msg-context-menu { display: flex; animation: fadeIn 0.2s ease; }
        .react-btn { font-size: 20px; cursor: pointer; transition: 0.2s; } .react-btn:hover { transform: scale(1.3); }
        .unsend-btn { color: #ff4c4c; font-size: 16px; cursor: pointer; margin-left: 10px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px; }
        .reaction-badge { position: absolute; bottom: -10px; right: 10px; background: var(--card-bg); padding: 3px 6px; border-radius: 12px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); display: none; }
        
        .chat-input-area { padding: 15px 20px; background: transparent; position: relative; }
        .chat-input-wrapper { display: flex; align-items: center; background: rgba(20,20,25,0.8); backdrop-filter: blur(15px); padding: 8px 8px 8px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .chat-input-wrapper input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 15px; }
        .send-btn { background: var(--msg-sent); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 16px; border: none; cursor: pointer; margin-left: 10px; transition: 0.2s; }
        .send-btn:active { transform: scale(0.8); }

    </style>
</head>
<body>

<div class="app-container">

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        
        <div class="sidebar-header" id="guestHeader">
            <div style="width: 60px; height: 60px; border-radius: 50%; background: #2a2a35; display: flex; justify-content: center; align-items: center; color: var(--text-muted); font-size: 24px; margin-bottom: 10px;">
                <i class="fa-solid fa-user-secret"></i>
            </div>
            <h3 style="color: white; font-size: 18px;">Welcome to Blendr</h3>
            <p style="color: var(--text-muted); font-size: 13px; margin-top: 5px;">Sync contacts to login</p>
        </div>

        <div class="sidebar-header" id="userHeader" style="display: none;">
            <div style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #ff2a7a, #00e5ff); display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; margin-bottom: 10px;">
                Tj
            </div>
            <h3 style="color: white; font-size: 18px; display: flex; align-items: center; gap: 8px;">
                Blendr Creator <i class="fa-solid fa-circle-check" style="color: var(--accent-cyan); font-size: 14px;"></i>
            </h3>
            <p style="color: var(--accent-cyan); font-size: 13px; margin-top: 5px;">@creator_tj</p>
        </div>

        <div class="menu-section active" id="guestMenu">
            <a href="#" class="sidebar-item"><i class="fa-solid fa-circle-info"></i> About Blendr</a>
            <a href="#" class="sidebar-item"><i class="fa-solid fa-shield-halved"></i> Privacy Policy</a>
        </div>

        <div class="menu-section" id="userMenu">
            <a href="profile.html" class="sidebar-item"><i class="fa-regular fa-circle-user"></i> My Profile</a>
            <a href="network.html" class="sidebar-item"><i class="fa-solid fa-users"></i> Network Hub</a>
            <a href="saved.html" class="sidebar-item"><i class="fa-regular fa-bookmark"></i> Saved Content</a>
            <a href="settings.html" class="sidebar-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-left">
            <i class="fa-solid fa-bars menu-btn" style="color: white;" onclick="toggleSidebar()"></i>
            <div class="brand"><h2>Blendr<span class="dot">.</span></h2></div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-camera"></i>
        </div>
    </header>

    <main class="content-area">
        
        <div class="sync-btn-container" id="sync-container">
            <button class="sync-btn" onclick="executeLoginAndFetch()">
                <i class="fa-solid fa-address-book" style="margin-right: 8px;"></i> Sync Real Contacts
            </button>
            <p style="color: var(--text-muted); font-size: 12px; margin-top: 15px; line-height: 1.5;">
                Browser will ask for permission.<br>We check local phonebook to find your friends.
            </p>
        </div>

        <div id="loading-skeletons" style="display: none;"></div>

        <div id="real-contact-list">
            </div>

    </main>

    <div class="nav-wrapper">
        <nav class="bottom-nav">
            <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i></a>
            <a href="#" class="nav-item"><i class="fa-regular fa-compass"></i></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-play"></i></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-user-group"></i></a>
            <a href="#" class="nav-item"><i class="fa-regular fa-circle-user"></i></a>
        </nav>
    </div>

    <div class="chat-overlay" id="chatOverlay">
        <header class="chat-header">
            <div class="chat-header-left">
                <i class="fa-solid fa-arrow-left" onclick="closeChat()"></i>
                <div>
                    <h3 id="chatUserName" style="font-size: 16px;">User</h3>
                    <p style="font-size: 12px; color: var(--accent-cyan);">Online</p>
                </div>
            </div>
            <div style="color: white; font-size: 18px; display: flex; gap: 20px;">
                <i class="fa-solid fa-palette" onclick="changeTheme()" title="Change Theme"></i>
                <i class="fa-solid fa-phone"></i>
            </div>
        </header>

        <div class="chat-messages" id="chatMessages">
            <div class="msg-wrapper received" onclick="toggleContextMenu(this)">
                <div class="msg-context-menu">
                    <span class="react-btn" onclick="addReaction(this, '❤️')">❤️</span>
                    <span class="react-btn" onclick="addReaction(this, '😂')">😂</span>
                    <span class="react-btn" onclick="addReaction(this, '😮')">😮</span>
                </div>
                <div class="msg-bubble">
                    Hey! Thanks for connecting. <div class="reaction-badge"></div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <i class="fa-solid fa-paperclip" style="color: var(--text-muted); font-size: 20px; margin-right: 15px;"></i>
                <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
                <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- SIDEBAR & AUTH STATE ---
    function toggleSidebar() { 
        document.getElementById('sidebarOverlay').classList.toggle('active'); 
        document.getElementById('sidebar').classList.toggle('active'); 
    }

    function setLoggedInState() {
        document.getElementById('guestHeader').style.display = 'none';
        document.getElementById('guestMenu').classList.remove('active');
        
        document.getElementById('userHeader').style.display = 'block';
        document.getElementById('userMenu').classList.add('active');
    }

    // --- WHATSAPP-STYLE CONTACT ENGINE ---
    async function executeLoginAndFetch() {
        const syncContainer = document.getElementById('sync-container');
        const skeletonContainer = document.getElementById('loading-skeletons');
        
        // 1. Enter Loading State
        syncContainer.style.display = 'none';
        skeletonContainer.style.display = 'block';
        skeletonContainer.innerHTML = Array(4).fill(`
            <div class="skel-card skeleton">
                <div class="skel-avatar skeleton"></div><div style="flex:1;"><div class="skel-line-1 skeleton"></div><div class="skel-line-2 skeleton"></div></div>
            </div>
        `).join('');

        try {
            // 2. Browser Native Phonebook API
            if ('contacts' in navigator && 'ContactsManager' in window) {
                const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: true });
                processContacts(contacts);
            } else {
                throw new Error("API not supported on this device/browser.");
            }
        } catch (ex) {
            // 3. Fallback: If browser denies permission, simulate the exact database split logic
            setTimeout(() => {
                const simulatedPhonebook = [
                    { name: ["Sarah Design"], tel: ["+1 555 1234"] },
                    { name: ["Alex Work"], tel: ["+1 555 9876"] },
                    { name: ["Jordan C."], tel: ["+1 555 4567"] },
                    { name: ["Mom"], tel: ["+1 555 0000"] }
                ];
                processContacts(simulatedPhonebook);
            }, 1500);
        }
    }

    function processContacts(rawContacts) {
        setLoggedInState(); // Unlocks Sidebar
        document.getElementById('loading-skeletons').style.display = 'none';
        
        const contactList = document.getElementById('real-contact-list');
        
        // Logic: Randomly simulate who is already registered in the Blendr DB
        let onBlendr = [];
        let inviteList = [];
        
        rawContacts.forEach((c, index) => {
            let contactData = {
                name: c.name ? c.name[0] : 'Unknown',
                phone: c.tel ? c.tel[0] : 'No Number'
            };
            // Simulate 50% of phonebook being on the app
            if(index % 2 === 0) onBlendr.push(contactData);
            else inviteList.push(contactData);
        });

        let html = '';

        // Generate WhatsApp Style: "On Blendr"
        if(onBlendr.length > 0) {
            html += `<div class="section-title">Contacts on Blendr</div><div class="chat-list">`;
            onBlendr.forEach((c, i) => {
                let initial = c.name.charAt(0).toUpperCase();
                let grad = i % 2 === 0 ? 'grad-1' : 'grad-2';
                html += `
                    <div class="chat-card" onclick="openChat('${c.name}')">
                        <div class="chat-avatar ${grad}">${initial}</div>
                        <div class="chat-info">
                            <h4>${c.name}</h4>
                            <p>Available on Blendr</p>
                        </div>
                        <button class="action-btn">Chat</button>
                    </div>`;
            });
            html += `</div>`;
        }

        // Generate WhatsApp Style: "Invite"
        if(inviteList.length > 0) {
            html += `<div class="section-title">Invite to Blendr</div><div class="chat-list">`;
            inviteList.forEach(c => {
                let initial = c.name.charAt(0).toUpperCase();
                html += `
                    <div class="chat-card">
                        <div class="chat-avatar grad-none">${initial}</div>
                        <div class="chat-info">
                            <h4>${c.name}</h4>
                            <p>${c.phone}</p>
                        </div>
                        <button class="action-btn invite" onclick="alert('Opening SMS to invite ${c.name}')">Invite</button>
                    </div>`;
            });
            html += `</div>`;
        }

        contactList.innerHTML = html;
    }

    // --- CHAT OVERLAY & FEATURES ---
    const chatOverlay = document.getElementById('chatOverlay');
    function openChat(name) { document.getElementById('chatUserName').textContent = name; chatOverlay.classList.add('active'); }
    function closeChat() { chatOverlay.classList.remove('active'); }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        
        const chatBox = document.getElementById('chatMessages');
        const newMsg = document.createElement('div');
        newMsg.className = 'msg-wrapper sent';
        newMsg.setAttribute('onclick', 'toggleContextMenu(this)');
        newMsg.innerHTML = `
            <div class="msg-context-menu"><span class="unsend-btn" onclick="unsendMessage(this)"><i class="fa-solid fa-trash"></i> Unsend</span></div>
            <div class="msg-bubble">${input.value.trim()}<div class="reaction-badge"></div></div>`;
        
        chatBox.appendChild(newMsg);
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function toggleContextMenu(el) {
        document.querySelectorAll('.msg-wrapper').forEach(e => { if(e !== el) e.classList.remove('active'); });
        el.classList.toggle('active');
    }

    function addReaction(btn, emoji) {
        event.stopPropagation();
        const wrapper = btn.closest('.msg-wrapper');
        const badge = wrapper.querySelector('.reaction-badge');
        badge.textContent = emoji; badge.style.display = 'block';
        wrapper.classList.remove('active');
    }

    function unsendMessage(btn) {
        event.stopPropagation();
        const wrapper = btn.closest('.msg-wrapper');
        wrapper.style.transform = "scale(0)"; wrapper.style.opacity = "0";
        setTimeout(() => wrapper.remove(), 300);
    }

    let currentTheme = 0; const themes = ['', 'theme-ocean', 'theme-cyber'];
    function changeTheme() {
        currentTheme = (currentTheme + 1) % themes.length;
        chatOverlay.className = 'chat-overlay active ' + themes[currentTheme];
        const notif = document.createElement('div');
        notif.style.cssText = "align-self: center; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 15px; font-size: 11px; color: var(--text-muted);";
        notif.textContent = "Theme updated.";
        document.getElementById('chatMessages').appendChild(notif);
    }
</script>
</body>
</html>
